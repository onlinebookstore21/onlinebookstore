<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            line-height: 1.6;
        }

        /* Navbar */
        header {
            background: #222;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #00adb5;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00adb5;
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            background: linear-gradient(to right, #00adb5, #222);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 50px;
        }

        .hero p {
            margin: 15px 0;
            font-size: 18px;
        }

        .btn {
            padding: 10px 20px;
            background: white;
            color: #222;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00adb5;
            color: white;
        }

        /* Features */
        .features {
            padding: 50px;
            text-align: center;
        }

        .feature-box {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 250px;
            padding: 20px;
            background: #f4f4f4;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #00adb5;
            color: white;
        }

        /* Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>MySite</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h2>Welcome to My Website</h2>
            <p>Create something amazing with HTML & CSS 🚀</p>
            <button class="btn">Get Started</button>
        </div>
    </section>

    <!-- Features -->
    <section class="features">
        <h2>Our Features</h2>

        <div class="feature-box">
            <div class="card">
                <h3>Fast</h3>
                <p>Lightning fast performance.</p>
            </div>

            <div class="card">
                <h3>Responsive</h3>
                <p>Works on all devices.</p>
            </div>

            <div class="card">
                <h3>Modern</h3>
                <p>Clean and stylish design.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

</body>
</html>
